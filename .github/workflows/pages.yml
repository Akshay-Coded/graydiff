name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # web/frontend/ is a plain static site (no build step) -- upload it
      # directly as the Pages artifact.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/frontend
      - id: deployment
        uses: actions/deploy-pages@v4
